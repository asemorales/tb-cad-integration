# NanoDet-Plus-m (320) adapted to the 2-class TB detection set.
# Based on the upstream config/nanodet-plus-m_320.yml (RangiLyu/nanodet),
# retargeted to this repo's COCO JSON (produced by yolo_to_coco.py) and nc=2.
#
# Cross-family lightweight baseline (~1.2M params, anchor-free FCOS-style head).
# NOT a controlled head-to-head with the YOLO cohort: different framework,
# resolution (320), optimizer, and label-assignment. Disclose all of these.
#
# Edit the absolute paths under data.*.img_path / ann_path and save_dir to match
# this checkout before training. From scratch: load_model is left empty.

save_dir: workspace/nanodet_tb
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone:
      name: ShuffleNetV2
      model_size: 1.0x
      out_stages: [2, 3, 4]
      activation: LeakyReLU
    fpn:
      name: GhostPAN
      in_channels: [116, 232, 464]
      out_channels: 96
      kernel_size: 5
      num_extra_level: 1
      use_depthwise: True
      activation: LeakyReLU
    head:
      name: NanoDetPlusHead
      num_classes: 2
      input_channel: 96
      feat_channels: 96
      stacked_convs: 2
      kernel_size: 5
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    aux_head:
      name: SimpleConvHead
      num_classes: 2
      input_channel: 192
      feat_channels: 192
      stacked_convs: 4
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7

data:
  train:
    name: CocoDataset
    img_path: /home/ase/code/alive-medical-platform/dataset/object-detection/images/train
    ann_path: /home/ase/code/alive-medical-platform/code/object-detection/nanodet/annotations/instances_train.json
    input_size: [320, 320]
    keep_ratio: False
    pipeline:
      perspective: 0.0
      scale: [0.6, 1.4]
      stretch: [[1, 1], [1, 1]]
      rotation: 0
      shear: 0
      translate: 0.2
      flip: 0.5
      brightness: 0.2
      contrast: [0.6, 1.4]
      saturation: [0.5, 1.2]
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]
  val:
    name: CocoDataset
    img_path: /home/ase/code/alive-medical-platform/dataset/object-detection/images/val
    ann_path: /home/ase/code/alive-medical-platform/code/object-detection/nanodet/annotations/instances_val.json
    input_size: [320, 320]
    keep_ratio: False
    pipeline:
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]

device:
  gpu_ids: [0]
  workers_per_gpu: 8
  batchsize_per_gpu: 16        # fits the 4GB 1050 Ti at 320; reduce if OOM
  precision: 16                # AMP, to stay within 4GB

schedule:
  load_model:                  # empty = train from scratch (matches YOLO protocol)
  optimizer:
    name: SGD
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0001
  warmup:
    name: linear
    steps: 500
    ratio: 0.0001
  total_epochs: 100
  lr_schedule:
    name: MultiStepLR
    milestones: [70, 90]
    gamma: 0.1
  val_intervals: 5

grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP

class_names: ["ActiveTuberculosis", "ObsoletePulmonaryTuberculosis"]
