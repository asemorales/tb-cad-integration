# Canonical run — these hyperparameters produced `best.ckpt`. See the README's
# "Reproduction" section for the headline test-set metrics.
# Override `training.log_dir` if you want runs to land somewhere other than
# `experiments/results/` (e.g. a Google Drive mount on Colab).
name: flipr_resnet18_k3_npt_nonbalanced_adam

data:
  root: ../../../dataset/classification
  image_size: 512
  batch_size: 16
  num_workers: 8
  pin_memory: true
  augment: false

model:
  num_classes: 3
  pretrained: false

training:
  epochs: 100
  lr: 1.0e-3
  weight_decay: 0.0
  scheduler: none
  precision: "32"
  seed: 42
  class_weights: null
  wandb_project: tb-classifier-adam
